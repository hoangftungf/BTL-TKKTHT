[pytest]
asyncio_mode = auto
addopts = -p no:warnings
filterwarnings = ignore
markers =
    grounding:   RAG grounding & anti-hallucination tests
    tracing:     Distributed tracing (X-Trace-Id) tests
    performance: Cold-start & async concurrency tests
    hybrid:      Hybrid KG + FAISS search accuracy tests
    regression:  Regression guard tests
    health:      Service health-check smoke tests
